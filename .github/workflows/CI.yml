name: CI

on:
  push:
    branches-ignore: [gh-pages]  # metrics commits to gh-pages must not re-trigger CI
  pull_request:
  workflow_dispatch:

# github-action-benchmark pushes the metrics history to the gh-pages branch.
permissions:
  contents: write
  deployments: write

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build & test on ${{ matrix.os }} with ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2022_64
          - os: ubuntu-latest
            qt_arch: linux_gcc_64
          - os: macos-latest
            qt_arch: clang_64

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.magic_pat }}

    - name: LOC count - app
      if: "startsWith(matrix.os, 'windows')"
      shell: pwsh
      run: |
        winget install --id AlDanial.Cloc --exact --silent --accept-package-agreements --accept-source-agreements
        "$env:LOCALAPPDATA\Microsoft\WinGet\Links" >> $env:GITHUB_PATH

        $result = cloc --include-lang="C,C++,C/C++ Header" --strip-str-comments `--exclude-dir=tests,bin,build,.git,3rdparty ` --by-file --json --quiet ./app/ | ConvertFrom-Json

        $loc = $result.SUM.code
        "App C/C++ code: $loc LOC"
        "LOC_APP=$loc" >> $env:GITHUB_ENV

        # Per-file counts (everything except the 'header' and 'SUM' meta entries)
        $result.PSObject.Properties |
          Where-Object { $_.Name -notin 'header','SUM' } |
          Sort-Object { $_.Value.code } -Descending |
          ForEach-Object { "{0,6}  {1}" -f $_.Value.code, $_.Name }

    - name: LOC count - libs
      if: "startsWith(matrix.os, 'windows')"
      shell: pwsh
      run: |
        $loc = (cloc --include-lang="C,C++,C/C++ Header" --strip-str-comments --exclude-dir=tests,bin,build,.git,3rdparty,app --json --quiet . | ConvertFrom-Json).SUM.code
        "Libs C/C++ code: $loc LOC"
        "LOC_LIBS=$loc" >> $env:GITHUB_ENV

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.10.*
        target: desktop
        arch: ${{ matrix.qt_arch }}
        archives: 'qtbase icu qtsvg'
        modules: 'qtimageformats qtmultimedia'
        cache: 'true'

    - name: Windows - set up MSVC environment
      if: startsWith(matrix.os, 'windows')
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Windows
      if: startsWith(matrix.os, 'windows')
      shell: cmd
      run: |
        %QT_ROOT_DIR%\bin\qmake.exe -v
        %QT_ROOT_DIR%\bin\qmake.exe -tp vc -r || exit /b 1
        msbuild /t:Build /p:Configuration=Release;PlatformToolset=v143 || exit /b 1

        bin\release\DarkroomTests.exe || exit /b 1

        @echo on
        set STAGING_DIR=dist
        RMDIR /S /Q %STAGING_DIR%
        mkdir %STAGING_DIR%
        copy /y bin\release\Darkroom.exe "%STAGING_DIR%\" >nul
        FOR %%p IN (%STAGING_DIR%\*.exe) DO %QT_ROOT_DIR%\bin\windeployqt.exe --dir %STAGING_DIR% --force --release --no-translations --no-system-d3d-compiler --no-system-dxc-compiler --no-opengl-sw --skip-plugin-types networkinformation --skip-plugin-types tls %%p

        del  %STAGING_DIR%\dxil.dll >nul
        del  %STAGING_DIR%\dxcompiler.dll >nul

        "%programfiles(x86)%\Inno Setup 6\iscc" installer.iss

    - name: .exe file size
      if: startsWith(matrix.os, 'windows')
      shell: powershell
      run: |
        $sizeKB = (Get-Item "bin\release\Darkroom.exe").Length / 1KB
        "{0:N2} KB" -f $sizeKB
        "EXE_KB=$([math]::Round($sizeKB, 2))" >> $env:GITHUB_ENV

    # Record LOC, exe size + per-section sizes to the gh-pages history and regenerate the chart.
    # Only on pushes to main so PRs/forks don't write history (and forks lack a write token).
    - name: Assemble metrics data
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(matrix.os, 'windows')
      shell: pwsh
      run: |
        $data = @(
          @{ name = 'Lines of code (app)';  unit = 'LOC'; value = [int]$env:LOC_APP  }
          @{ name = 'Lines of code (libs)'; unit = 'LOC'; value = [int]$env:LOC_LIBS }
          @{ name = 'Darkroom.exe size';    unit = 'KB';  value = [double]$env:EXE_KB }
        )

        # Per-PE-section on-disk sizes from the "size of raw data" field of each SECTION HEADER.
        # dumpbin is on PATH via the earlier MSVC dev-cmd step. Each section becomes its own chart; .msvcjmc is skipped.
        $name = $null
        $sections = @()
        foreach ($line in (dumpbin /headers bin\release\Darkroom.exe)) {
          if     ($line -match '^\s+(\S+) name$')                                 { $name = $Matches[1] }
          elseif ($line -match '^\s+([0-9A-Fa-f]+) size of raw data$' -and $name) {
            $sections += [pscustomobject]@{ Name = $name; KB = [math]::Round([Convert]::ToInt64($Matches[1], 16) / 1KB, 2) }
            $name = $null
          }
        }
        $sections | Sort-Object KB -Descending | Format-Table Name, KB -AutoSize
        foreach ($s in $sections | Where-Object Name -ne '.msvcjmc') {
          $data += @{ name = "Section $($s.Name)"; unit = 'KB'; value = $s.KB }
        }

        $data | ConvertTo-Json -AsArray | Out-File -FilePath metrics.json -Encoding utf8
        Get-Content metrics.json

    - name: Update metrics history & chart (gh-pages)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(matrix.os, 'windows')
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Darkroom metrics
        tool: customSmallerIsBetter
        output-file-path: metrics.json
        benchmark-data-dir-path: dev/metrics  # where data.js + index.html live on gh-pages (default: dev/bench)
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        # Don't treat a change as a regression
        comment-on-alert: false
        fail-on-alert: false

    - name: Mac
      if: startsWith(matrix.os, 'macos')
      run: |
        clang --version
        $QT_ROOT_DIR/bin/qmake -r
        make -j
        ./bin/release/DarkroomTests

    - name: Linux
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt update -y; sudo apt install -qq gcc-14 g++-14 libgl1-mesa-dev
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 50
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 50
        g++ --version

        $QT_ROOT_DIR/bin/qmake -r
        make -j
        ./bin/release/DarkroomTests

    - name: Archive Installer
      if: success() && startsWith(matrix.os, 'windows')
      uses: actions/upload-artifact@v4
      with:
        name: Darkroom.exe
        path: Darkroom.exe