<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="512"
   height="512"
   viewBox="0 0 512 512"
   version="1.1"
   id="svg50"
   sodipodi:docname="icon.svg"
   inkscape:version="1.1 (c68e22c387, 2021-05-23)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview52"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     showgrid="false"
     inkscape:zoom="1.609375"
     inkscape:cx="255.68932"
     inkscape:cy="255.68932"
     inkscape:window-width="1920"
     inkscape:window-height="1009"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg50" />
  <defs
     id="defs26">
    <!-- Very dark background, slight radial lift in centre -->
    <radialGradient
       id="bg"
       cx="50%"
       cy="50%"
       r="65%">
      <stop
         offset="0%"
         stop-color="#111528"
         id="stop2" />
      <stop
         offset="100%"
         stop-color="#07080e"
         id="stop4" />
    </radialGradient>
    <!-- Bold cyan-to-blue for the single window -->
    <linearGradient
       id="win"
       x1="0"
       y1="0"
       x2="0"
       y2="1">
      <stop
         offset="0%"
         stop-color="#00f2ff"
         id="stop7" />
      <stop
         offset="100%"
         stop-color="#0044ec"
         id="stop9" />
    </linearGradient>
    <!-- Gloss highlight on the window -->
    <linearGradient
       id="gloss"
       x1="0"
       y1="0"
       x2="0"
       y2="1">
      <stop
         offset="0%"
         stop-color="#ffffff"
         stop-opacity="0.32"
         id="stop12" />
      <stop
         offset="100%"
         stop-color="#ffffff"
         stop-opacity="0"
         id="stop14" />
    </linearGradient>
    <!-- Soft ambient glow behind the window -->
    <filter
       id="glow"
       x="-0.11351351"
       y="-0.28"
       width="1.227027"
       height="1.56">
      <feGaussianBlur
         in="SourceGraphic"
         stdDeviation="14"
         result="blur"
         id="feGaussianBlur17" />
      <feMerge
         id="feMerge23">
        <feMergeNode
           in="blur"
           id="feMergeNode19" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode21" />
      </feMerge>
    </filter>
  </defs>
  <!-- ─── Background ─── -->
  <!-- ─── Film strip body ───────────────────────────────────────────────────
       x=72, y=148, w=368, h=216  →  centred at (256, 256)
  ──────────────────────────────────────────────────────────────────────── -->
  <rect
     x="72"
     y="148"
     width="368"
     height="216"
     rx="12"
     fill="#21253e"
     stroke="#2d315a"
     stroke-width="1.5"
     id="rect30"
     style="fill:#87aade" />
  <!-- ─── Perforation holes ─────────────────────────────────────────────────
       3 holes × 32 w × 26 h per row
       gap = (368 − 3×32) / 4 = 68 px  →  x: 140, 240, 340
  ──────────────────────────────────────────────────────────────────────── -->
  <!-- Top row  (y = 158, margin 10 px from strip top) -->
  <rect
     x="140"
     y="158"
     width="32"
     height="26"
     rx="5"
     fill="#07080e"
     id="rect32"
     style="fill:#000000" />
  <rect
     x="240"
     y="158"
     width="32"
     height="26"
     rx="5"
     fill="#07080e"
     id="rect34"
     style="fill:#000000" />
  <rect
     x="340"
     y="158"
     width="32"
     height="26"
     rx="5"
     fill="#07080e"
     id="rect36"
     style="fill:#000000" />
  <!-- Bottom row  (y = 328, margin 10 px from strip bottom at 364) -->
  <rect
     x="140"
     y="328"
     width="32"
     height="26"
     rx="5"
     fill="#07080e"
     id="rect38"
     style="fill:#000000" />
  <rect
     x="240"
     y="328"
     width="32"
     height="26"
     rx="5"
     fill="#07080e"
     id="rect40"
     style="fill:#000000" />
  <rect
     x="340"
     y="328"
     width="32"
     height="26"
     rx="5"
     fill="#07080e"
     id="rect42"
     style="fill:#000000" />
  <!-- ─── Central window ────────────────────────────────────────────────────
       x=108, y=196, w=296, h=120  →  centred at (256, 256)
       Sits between the two perf rows (perf bottom: 184; perf top: 328)
  ──────────────────────────────────────────────────────────────────────── -->
  <!-- Glow layer (blurred duplicate, drawn first) -->
  <rect
     x="108"
     y="196"
     width="296"
     height="120"
     rx="8"
     fill="#00d8ff"
     opacity="0.55"
     filter="url(#glow)"
     id="rect44" />
  <!-- Window fill -->
  <rect
     x="108"
     y="196"
     width="296"
     height="120"
     rx="8"
     fill="url(#win)"
     id="rect46" />
  <!-- Gloss on upper portion of window -->
  <rect
     x="108"
     y="196"
     width="296"
     height="46"
     rx="8"
     fill="url(#gloss)"
     id="rect48" />
</svg>
